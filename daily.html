<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>Daily Challenge</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="topbar">

<a href="index.html" class="back-btn">←</a>

<h2>Daily Challenge</h2>

</div>

<div class="page">

<div class="daily-header">

<div class="daily-title">
🔥 New Challenge Everyday
</div>

<div class="daily-date" id="challengeDate"></div>

</div>

<div class="container">

<div class="tablebox">

<h3>Table A</h3>

<textarea id="tableA"></textarea>

</div>

<div class="tablebox">

<h3>Table B</h3>

<textarea id="tableB"></textarea>

</div>

</div>

<div class="question-box" id="questionText"></div>

<label>Your Guess (Row Count)</label>

<input type="number" id="guess">

<button class="check" onclick="checkDailyChallenge()">
Submit Answer
</button>

<button class="reveal" onclick="revealDailyAnswer()">
Reveal Answer
</button>

<div class="result" id="result"></div>

<table>

<thead>
<tr>
<th>A.id</th>
<th>B.id</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

<div class="explanation" id="explanation"></div>

<div id="toast" class="toast"></div>

</div>

<script src="daily.js"></script>

</body>
</html>
