<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>Practice Mode</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
<a href="index.html" class="back-btn">←</a>
<h2>Practice Mode</h2>
</div>

<div class="page">

<label>Difficulty</label>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button class="generate" onclick="generate()">
Generate Question
</button>

<div class="container">

<div class="tablebox">
<h3>Table A</h3>
<textarea id="tableA"></textarea>
</div>

<div class="tablebox">
<h3>Table B</h3>
<textarea id="tableB"></textarea>
</div>

</div>

<label>Join Type</label>

<select id="joinType">
<option value="inner">Inner Join</option>
<option value="left">Left Join</option>
<option value="right">Right Join</option>
<option value="full">Full Join</option>
<option value="cartesian">Cartesian Join</option>
<option value="union">Union</option>
<option value="unionall">Union All</option>
</select>

<label>Your Guess (Row Count)</label>
<input type="number" id="guess">

<button class="check" onclick="check()">
Check Answer
</button>

<button class="reveal" onclick="reveal()">
Reveal Answer
</button>

<div class="result" id="result"></div>

<div class="explanation" id="explanation"></div>

<table>
<thead>
<tr>
<th>A.id</th>
<th>B.id</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

</div>

<script src="app.js"></script>

</body>
</html>
