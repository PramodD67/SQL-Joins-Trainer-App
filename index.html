<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQL Join Trainer</title>

<style>

body{
font-family:-apple-system;
margin:15px;
background:#f4f4f4;
}

h1{
font-size:22px;
}

.container{
display:flex;
gap:15px;
}

.tablebox{
flex:1;
}

textarea{
width:100%;
height:140px;
font-size:16px;
margin-bottom:10px;
}

select,input{
width:100%;
padding:10px;
font-size:16px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
margin-top:8px;
border:none;
border-radius:8px;
color:white;
}

.generate{
background:#34C759;
}

.check{
background:#007AFF;
}

.reveal{
background:#FF9500;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:white;
}

td,th{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

.result{
font-size:18px;
font-weight:bold;
margin-top:12px;
}

</style>

</head>

<body>

<h1>SQL Join Trainer</h1>

<label>Difficulty</label>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button class="generate" onclick="generate()">
Generate Question
</button>

<div class="container">

<div class="tablebox">

<h3>Table A</h3>
<textarea id="tableA"></textarea>

</div>

<div class="tablebox">

<h3>Table B</h3>
<textarea id="tableB"></textarea>

</div>

</div>

<label>Join Type</label>

<select id="joinType">
<option value="inner">Inner Join</option>
<option value="left">Left Join</option>
<option value="right">Right Join</option>
<option value="full">Full Join</option>
<option value="cartesian">Cartesian Join</option>
<option value="union">Union</option>
<option value="unionall">Union All</option>
</select>

<label>Your Guess (Row Count)</label>
<input type="number" id="guess">

<button class="check" onclick="check()">
Check Answer
</button>

<button class="reveal" onclick="reveal()">
Reveal Answer
</button>

<div class="result" id="result"></div>

<table>

<thead>
<tr>
<th>A.id</th>
<th>B.id</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

<script>

let answer=[]

function displayValue(v){
return v===null ? "NULL" : v
}

function generateValue(type,max,includeNull){

if(includeNull && Math.random()<0.35){
return null
}

if(type==="number"){
return Math.floor(Math.random()*max)+1
}

return String.fromCharCode(65 + Math.floor(Math.random()*max))
}

function randomList(size,max,includeNull,type){

let arr=[]

for(let i=0;i<size;i++){
arr.push(generateValue(type,max,includeNull))
}

return arr

}

function generate(){

let diff=document.getElementById("difficulty").value

let sizeA=3
let sizeB=3
let max=3
let includeNull=false

if(diff==="medium"){
sizeA=5
sizeB=5
max=4
includeNull=true
}

if(diff==="hard"){
sizeA=7
sizeB=7
max=5
includeNull=true
}

let type=Math.random()<0.5 ? "number" : "alpha"

let A=randomList(sizeA,max,includeNull,type)
let B=randomList(sizeB,max,includeNull,type)

document.getElementById("tableA").value =
A.map(displayValue).join("\n")

document.getElementById("tableB").value =
B.map(displayValue).join("\n")

document.getElementById("rows").innerHTML=""
document.getElementById("result").innerText=""

}

function parse(x){

return x.split(/\n/).map(v=>{

v=v.trim()

if(v.toLowerCase()==="null") return null

return v

})

}

function join(A,B,type){

let rows=[]

if(type==="inner"){

A.forEach(a=>{
B.forEach(b=>{
if(a!==null && b!==null && a===b){
rows.push([a,b])
}
})
})

}

if(type==="left"){

A.forEach(a=>{

let matched=false

B.forEach(b=>{

if(a!==null && b!==null && a===b){
rows.push([a,b])
matched=true
}

})

if(!matched){
rows.push([a,null])
}

})

}

if(type==="right"){

B.forEach(b=>{

let matched=false

A.forEach(a=>{

if(a!==null && b!==null && a===b){
rows.push([a,b])
matched=true
}

})

if(!matched){
rows.push([null,b])
}

})

}

if(type==="full"){

let matched=new Array(B.length).fill(false)

A.forEach(a=>{

let m=false

B.forEach((b,i)=>{

if(a!==null && b!==null && a===b){
rows.push([a,b])
matched[i]=true
m=true
}

})

if(!m){
rows.push([a,null])
}

})

B.forEach((b,i)=>{

if(!matched[i]){
rows.push([null,b])
}

})

}

if(type==="cartesian"){

A.forEach(a=>{
B.forEach(b=>{
rows.push([a,b])
})
})

}

if(type==="union"){

let set=[...new Set([...A,...B])]
set.forEach(x=>rows.push([x,""]))

}

if(type==="unionall"){

[...A,...B].forEach(x=>rows.push([x,""]))

}

return rows

}

function check(){

let A=parse(document.getElementById("tableA").value)
let B=parse(document.getElementById("tableB").value)

let type=document.getElementById("joinType").value

answer=join(A,B,type)

let guess=parseInt(document.getElementById("guess").value)

if(guess===answer.length){
document.getElementById("result").innerText="✅ Correct"
}else{
document.getElementById("result").innerText="❌ Incorrect"
}

}

function reveal(){

let tbody=document.getElementById("rows")

tbody.innerHTML=""

answer.forEach(r=>{

let tr=document.createElement("tr")

let a=displayValue(r[0])
let b=displayValue(r[1])

tr.innerHTML="<td>"+a+"</td><td>"+b+"</td>"

tbody.appendChild(tr)

})

document.getElementById("result").innerText =
"Correct Row Count = " + answer.length

}

</script>

</body>

</html>
