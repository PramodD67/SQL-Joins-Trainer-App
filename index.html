<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport
fit=cover">
<meta name="color-scheme" content="light dark">
<title>SQL Joins PlayGround</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hero">
<h1>SQL Joins PlayGround</h1>
<p class="subtitle">
Master SQL Join Counts for Interviews
</p>
</div>
<div class="home-grid">
<a href="practice.html" class="mode-card practice-card">
<div class="mode-title">Practice Mode</div>
<div class="mode-desc">
Unlimited random SQL join problems
</div>
</a>
<a href="interview.html" class="mode-card interview-card">
<div class="mode-title">Interview Mode</div>
<div class="mode-desc">
Timed SQL interview simulation
</div>
</a>
<div class="mode-card daily-card">
<div class="mode-title">Daily Challenge</div>
<div class="mode-desc">
New join puzzle every day
</div>
</div>
</div>
<div class="page">
<label>Difficulty</label>
<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>
<button class="generate" onclick="generate()">
Generate Question
</button>
<button class="interview" id="startInterview">
Start Interview Mode
</button>
<div id="interviewPanel" class="panel hidden">
<div class="panel-item" id="questionNumber">
Question 1 / 10
</div>
<div class="panel-item" id="timer">
60s
</div>
<div class="panel-item" id="score">
Score: 0
</div>
</div>
<div class="container">
<div class="tablebox">
<h3>Table A</h3>
<textarea id="tableA"></textarea>
</div>
<div class="tablebox">
<h3>Table B</h3>
<textarea id="tableB"></textarea>
</div>
</div>
<label>Join Type</label>
<select id="joinType">
<option value="inner">Inner Join</option>
<option value="left">Left Join</option>
<option value="right">Right Join</option>
<option value="full">Full Join</option>
<option value="cartesian">Cartesian Join</option>
<option value="union">Union</option>
<option value="unionall">Union All</option>
</select>
<label>Your Guess (Row Count)</label>
<input type="number" id="guess">
<button class="check" onclick="check()">
Check Answer
</button>
<button class="reveal" onclick="reveal()">
Reveal Answer
</button>
<button class="share" onclick="shareResult()">
Share Result
</button>
<div class="result" id="result"></div>
<div class="explanation" id="explanation"></div>
<table>
<thead>
<tr>
<th>A.id</th>
<th>B.id</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>
<script src="app.js"></script>
</body>
</html>
