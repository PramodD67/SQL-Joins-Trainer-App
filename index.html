<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SQL Join Trainer Pro</title>

<style>

body{
font-family:-apple-system;
margin:15px;
background:#f4f4f4;
}

h1{
font-size:22px;
}

textarea{
width:100%;
height:70px;
font-size:16px;
margin-bottom:10px;
}

select,input{
width:100%;
padding:10px;
font-size:16px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
margin-top:6px;
border:none;
background:#007AFF;
color:white;
border-radius:8px;
}

button:active{
background:#005ccc;
}

.score{
margin-top:10px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:white;
}

td,th{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

.timer{
font-size:18px;
margin-top:5px;
}

</style>

</head>

<body>

<h1>SQL Join Trainer Pro</h1>

<label>Difficulty</label>

<select id="difficulty">

<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>

</select>

<div class="timer">
Time: <span id="timer">0</span> sec
</div>

<div class="score">
Score: <span id="score">0</span>
</div>

<h3>Table A</h3>
<textarea id="tableA"></textarea>

<h3>Table B</h3>
<textarea id="tableB"></textarea>

<label>Join Type</label>

<select id="joinType">

<option value="inner">Inner Join</option>
<option value="left">Left Join</option>
<option value="right">Right Join</option>
<option value="full">Full Join</option>
<option value="cartesian">Cartesian</option>
<option value="union">Union</option>
<option value="unionall">Union All</option>

</select>

<label>Your Answer (Row Count)</label>
<input type="number" id="guess">

<button onclick="generate()">New Question</button>
<button onclick="check()">Check Answer</button>
<button onclick="showRows()">Reveal Output</button>

<div id="result"></div>

<table>

<thead>
<tr>
<th>A.id</th>
<th>B.id</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

<script>

let answer=[]
let score=0
let seconds=0

setInterval(()=>{

seconds++
document.getElementById("timer").innerText=seconds

},1000)

function randomList(size,max){

let arr=[]

for(let i=0;i<size;i++){

arr.push(Math.floor(Math.random()*max)+1)

}

return arr

}

function generate(){

let diff=document.getElementById("difficulty").value

let sizeA=3
let sizeB=3
let max=3

if(diff==="medium"){

sizeA=5
sizeB=5
max=4

}

if(diff==="hard"){

sizeA=7
sizeB=7
max=5

}

let A=randomList(sizeA,max)
let B=randomList(sizeB,max)

document.getElementById("tableA").value=A.join(",")
document.getElementById("tableB").value=B.join(",")

document.getElementById("result").innerText=""
document.getElementById("rows").innerHTML=""

}

function parse(x){

return x.split(",").map(v=>v.trim()).filter(v=>v!=="")

}

function join(A,B,type){

let rows=[]

if(type==="inner"){

A.forEach(a=>{
B.forEach(b=>{
if(a===b) rows.push([a,b])
})
})

}

if(type==="left"){

A.forEach(a=>{

let m=false

B.forEach(b=>{

if(a===b){

rows.push([a,b])
m=true

}

})

if(!m) rows.push([a,null])

})

}

if(type==="right"){

B.forEach(b=>{

let m=false

A.forEach(a=>{

if(a===b){

rows.push([a,b])
m=true

}

})

if(!m) rows.push([null,b])

})

}

if(type==="full"){

let matched=new Array(B.length).fill(false)

A.forEach(a=>{

let m=false

B.forEach((b,i)=>{

if(a===b){

rows.push([a,b])
matched[i]=true
m=true

}

})

if(!m) rows.push([a,null])

})

B.forEach((b,i)=>{

if(!matched[i]) rows.push([null,b])

})

}

if(type==="cartesian"){

A.forEach(a=>{
B.forEach(b=>{
rows.push([a,b])
})
})

}

if(type==="union"){

let set=[...new Set([...A,...B])]

set.forEach(x=>rows.push([x,""]))

}

if(type==="unionall"){

[...A,...B].forEach(x=>rows.push([x,""]))

}

return rows

}

function check(){

let A=parse(document.getElementById("tableA").value)
let B=parse(document.getElementById("tableB").value)

let type=document.getElementById("joinType").value

answer=join(A,B,type)

let guess=parseInt(document.getElementById("guess").value)

if(guess===answer.length){

score++
document.getElementById("score").innerText=score

document.getElementById("result").innerText="✅ Correct"

}else{

document.getElementById("result").innerText="❌ Correct = "+answer.length

}

}

function showRows(){

let tbody=document.getElementById("rows")

tbody.innerHTML=""

answer.forEach(r=>{

let tr=document.createElement("tr")

let a=r[0]??"NULL"
let b=r[1]??"NULL"

tr.innerHTML="<td>"+a+"</td><td>"+b+"</td>"

tbody.appendChild(tr)

})

}

</script>

</body>

</html>
